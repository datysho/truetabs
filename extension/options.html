<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>TrueTabs</title>
    <link rel="stylesheet" href="theme.css" />
    <style>
      body {
        padding: 24px 20px 48px;
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      /* Anti-flicker: nothing paints until every control carries its REAL
         stored value - a neutral blink beats a wrong state flipping over. */
      body:not(.ready) {
        visibility: hidden;
      }
      .page {
        width: 100%;
        max-width: 560px;
      }
      /* Centered page header (family style, same as TruePin's options). */
      .pagehead {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        margin: 4px 2px 16px;
      }
      .pagehead img {
        width: 24px;
        height: 24px;
        border-radius: 5px;
      }
      .pagehead .name {
        font-weight: 600;
        font-size: 16px;
      }
      .pagehead .headver {
        color: var(--muted);
        font-size: 12px;
        align-self: flex-end;
        padding-bottom: 1px;
      }
      .card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 12px;
        overflow: hidden;
      }
      .card h3 {
        padding: 14px 16px 0;
        margin: 0;
      }
      .setting {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 12px 16px;
        border-bottom: 1px solid var(--border);
      }
      .setting:last-child {
        border-bottom: none;
      }
      /* A control that governs nothing right now says so, rather than
         pretending its state matters (same contract as the popup's AI row). */
      .setting.dim {
        opacity: 0.45;
      }
      .setting .info {
        flex: 1;
        min-width: 0;
      }
      .setting .label {
        font-weight: 500;
      }
      .setting .hint {
        color: var(--muted);
        font-size: 12px;
        margin-top: 2px;
      }
      .setting select {
        min-width: 130px;
      }
      .setting textarea {
        width: 100%;
        min-height: 64px;
      }
      .setting.stack {
        flex-direction: column;
        align-items: stretch;
        gap: 8px;
      }
      .byok-grid {
        display: grid;
        grid-template-columns: 110px 1fr;
        gap: 8px 10px;
        align-items: center;
      }
      .byok-grid label {
        color: var(--muted);
        font-size: 12px;
      }
      .byok-grid input,
      .byok-grid select {
        width: 100%;
      }
      .byok-actions {
        display: flex;
        gap: 8px;
        align-items: center;
      }
      .byok-note {
        font-size: 12px;
        color: var(--muted);
      }
      .gap {
        height: 16px;
      }
      .footrow {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-top: 16px;
      }
      .footrow .note {
        color: var(--muted);
        font-size: 12px;
      }
      /* Inline warning box: soft error surface, not a bare red string. */
      .warnbox {
        background: color-mix(in srgb, var(--err) 10%, transparent);
        color: var(--err);
        border-radius: 8px;
        padding: 8px 12px;
        font-size: 12px;
        width: 100%;
      }
      .warnbox[hidden] {
        display: none !important;
      }
      /* chrome:// links: clickable, and the URL wraps as one word. */
      .chromelink {
        color: var(--accent);
        text-decoration: underline;
        cursor: pointer;
        display: inline-block;
        white-space: nowrap;
      }
      #smartProgress {
        font-size: 12px;
        color: var(--muted);
      }
      /* Manual-copy fallback when the clipboard refuses the write. */
      .diagdump {
        width: 100%;
        min-height: 120px;
        margin-top: 8px;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 11px;
      }
      .diagdump[hidden] {
        display: none !important;
      }
      /* Custom rule groups: one bordered item per rule. */
      .custom-item {
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 10px 12px;
        margin-bottom: 8px;
        display: grid;
        grid-template-columns: 1fr auto auto;
        gap: 8px 10px;
        align-items: center;
      }
      .custom-item input[type="text"] {
        width: 100%;
      }
      .custom-item .full {
        grid-column: 1 / -1;
      }
      .custom-item .c-name {
        font-weight: 500;
      }
      .custom-item .linklike {
        border: none;
        background: transparent;
        color: var(--muted);
        padding: 2px 6px;
        font-size: 12px;
      }
      .custom-item .linklike:hover {
        color: var(--err);
      }
      .custom-actions {
        display: flex;
        align-items: center;
        gap: 10px;
      }
      /* Engine-down notice: the page must read even when the service worker
         is stale or dead (mid-update) - never a blank skeleton. */
      .engine-down {
        background: color-mix(in srgb, var(--err) 10%, transparent);
        border: 1px solid color-mix(in srgb, var(--err) 35%, transparent);
        border-radius: 12px;
        padding: 14px 16px;
        margin-bottom: 16px;
      }
      .engine-down .title {
        font-weight: 600;
        color: var(--err);
        margin-bottom: 4px;
      }
      .engine-down .body {
        font-size: 13px;
        margin-bottom: 10px;
      }
      .engine-down[hidden] {
        display: none !important;
      }
      .ok {
        color: var(--ok);
      }
      .err {
        color: var(--err);
      }
    </style>
  </head>
  <body>
    <div class="page">
      <div class="pagehead">
        <img src="icons/tt-32.png" alt="" />
        <span class="name">TrueTabs</span>
        <span class="headver" id="version"></span>
      </div>

      <div class="engine-down" id="engineDown" hidden>
        <div class="title" data-i18n="engineDownTitle"></div>
        <div class="body" data-i18n="engineDownBody"></div>
        <button id="engineResetBtn" data-i18n="engineReset"></button>
      </div>

      <div class="card">
        <h3 data-i18n="optDupesHeader"></h3>
        <div class="setting">
          <div class="info">
            <div class="label" data-i18n="optDedupAuto"></div>
            <div class="hint" data-i18n="optDedupAutoHint"></div>
          </div>
          <input type="checkbox" class="switch" id="dedupAuto" />
        </div>
        <div class="setting">
          <div class="info">
            <div class="label" data-i18n="optDedupScope"></div>
          </div>
          <select id="dedupScope">
            <option value="all" data-i18n="optScopeAll"></option>
            <option value="window" data-i18n="optScopeWindow"></option>
          </select>
        </div>

        <h3 data-i18n="optArchiveHeader"></h3>
        <div class="setting">
          <div class="info">
            <div class="label" data-i18n="optArchiveAfter"></div>
            <div class="hint" data-i18n="optArchiveAfterHint"></div>
          </div>
          <select id="archiveAfter">
            <option value="6h">6h</option>
            <option value="12h">12h</option>
            <option value="24h">24h</option>
            <option value="3d" data-i18n="optDays3"></option>
            <option value="7d" data-i18n="optDays7"></option>
            <option value="off" data-i18n="optOff"></option>
          </select>
        </div>
        <div class="setting">
          <div class="info">
            <div class="label" data-i18n="optArchiveTtl"></div>
            <div class="hint" data-i18n="optArchiveTtlHint"></div>
          </div>
          <select id="archiveTtl">
            <option value="7d" data-i18n="optDays7"></option>
            <option value="30d" data-i18n="optDays30"></option>
            <option value="90d" data-i18n="optDays90"></option>
            <option value="forever" data-i18n="optForever"></option>
          </select>
        </div>
        <div class="setting">
          <div class="info">
            <div class="label" data-i18n="optArchiveNotify"></div>
          </div>
          <input type="checkbox" class="switch" id="archiveNotify" />
        </div>
        <div class="setting">
          <div class="info">
            <div class="label" data-i18n="optArchiveForeign"></div>
            <div class="hint" data-i18n="optArchiveForeignHint"></div>
          </div>
          <input type="checkbox" class="switch" id="archiveForeignGroups" />
        </div>
        <div class="setting">
          <div class="info">
            <div class="label" data-i18n="optDiscard"></div>
            <div class="hint" data-i18n="optDiscardHint"></div>
          </div>
          <input type="checkbox" class="switch" id="discardStale" />
        </div>
        <div class="setting stack">
          <div class="info">
            <div class="label" data-i18n="optAllowlist"></div>
            <div class="hint" data-i18n="optAllowlistHint"></div>
          </div>
          <textarea id="archiveAllowlist" spellcheck="false"></textarea>
        </div>

        <h3 data-i18n="optGroupsHeader"></h3>
        <div class="setting">
          <div class="info">
            <div class="label" data-i18n="optAutoGroup"></div>
            <div class="hint" data-i18n="optAutoGroupHint"></div>
            <div class="hint err" id="autoGroupNeedsAi" data-i18n="optAutoGroupNeedsAi" hidden></div>
          </div>
          <select id="autoGroup">
            <option value="off" data-i18n="optOff"></option>
            <option value="site" data-i18n="optAutoGroupSite"></option>
            <option value="topic" data-i18n="optAutoGroupTopic"></option>
          </select>
        </div>
        <div class="setting">
          <div class="info">
            <div class="label" data-i18n="optCollapse"></div>
          </div>
          <select id="groupCollapseAfter">
            <option value="off" data-i18n="optOff"></option>
            <option value="5m">5m</option>
            <option value="10m">10m</option>
            <option value="30m">30m</option>
          </select>
        </div>
        <div class="setting">
          <div class="info">
            <div class="label" data-i18n="optSortGroups"></div>
            <div class="hint" data-i18n="optSortGroupsHint"></div>
          </div>
          <select id="sortGroups">
            <option value="off" data-i18n="optSortManual"></option>
            <option value="title" data-i18n="optSortTitle"></option>
            <option value="recent" data-i18n="optSortRecent"></option>
            <option value="opened" data-i18n="optSortOpened"></option>
          </select>
        </div>
        <div class="setting">
          <div class="info">
            <div class="label" data-i18n="optSortTabs"></div>
            <div class="hint" data-i18n="optSortTabsHint"></div>
          </div>
          <select id="sortTabs">
            <option value="off" data-i18n="optSortManual"></option>
            <option value="title" data-i18n="optSortTitle"></option>
            <option value="recent" data-i18n="optSortRecent"></option>
            <option value="opened" data-i18n="optSortOpened"></option>
          </select>
        </div>
        <div class="setting" id="sortAutoRow">
          <div class="info">
            <div class="label" data-i18n="optSortAuto"></div>
            <div class="hint" data-i18n="optSortAutoHint"></div>
          </div>
          <input type="checkbox" class="switch" id="sortAuto" />
        </div>
        <div class="setting">
          <div class="info">
            <div class="label" data-i18n="optOtherGroup"></div>
            <div class="hint" data-i18n="optOtherGroupHint"></div>
          </div>
          <input type="checkbox" class="switch" id="otherGroup" />
        </div>
        <div class="setting">
          <div class="info">
            <div class="label" data-i18n="optGroupsOnTop"></div>
            <div class="hint" data-i18n="optGroupsOnTopHint"></div>
          </div>
          <input type="checkbox" class="switch" id="groupsOnTop" />
        </div>

        <h3 data-i18n="optCustomHeader"></h3>
        <div class="setting stack">
          <div class="info">
            <div class="hint" data-i18n="optCustomHint"></div>
          </div>
          <div id="customList"></div>
          <div class="custom-actions">
            <button id="customAddBtn" data-i18n="customAdd"></button>
            <span class="byok-note err" id="customNote"></span>
          </div>
        </div>
        <div class="setting stack">
          <div class="info">
            <div class="label" data-i18n="optProtected"></div>
            <div class="hint" data-i18n="optProtectedHint"></div>
          </div>
          <textarea id="protectedGroups" spellcheck="false"></textarea>
        </div>
        <div class="setting">
          <div class="info">
            <div class="label" data-i18n="optBmkGroups"></div>
            <div class="hint" data-i18n="optBmkGroupsHint"></div>
          </div>
          <input type="checkbox" class="switch" id="bookmarkGroups" />
        </div>

        <h3 data-i18n="optDataHeader"></h3>
        <div class="setting stack">
          <div class="info">
            <div class="hint" data-i18n="optDataHint"></div>
          </div>
          <div class="custom-actions">
            <button id="exportBtn" data-i18n="dataExport"></button>
            <button id="importBtn" data-i18n="dataImport"></button>
            <input type="file" id="importFile" accept="application/json" hidden />
            <span class="byok-note" id="dataNote" style="visibility: hidden"></span>
          </div>
        </div>
        <div class="setting">
          <div class="info">
            <div class="label" data-i18n="dataIncludeKey"></div>
            <div class="hint err" data-i18n="dataIncludeKeyWarn"></div>
          </div>
          <input type="checkbox" class="switch" id="exportWithKey" />
        </div>

        <h3 data-i18n="optSmartHeader"></h3>
        <div class="setting">
          <div class="info">
            <div class="label" data-i18n="optSmartEngine"></div>
            <div class="hint" data-i18n="optSmartEngineHint"></div>
          </div>
          <select id="smartEngine">
            <option value="off" data-i18n="optOff"></option>
            <option value="builtin" data-i18n="optSmartBuiltin"></option>
            <option value="byok" data-i18n="optSmartByok"></option>
          </select>
        </div>
        <div class="setting" id="builtinRow" hidden>
          <div class="info">
            <div class="label" data-i18n="optSmartBuiltinStatus"></div>
            <div class="hint" id="builtinStatus"></div>
            <div class="hint" id="builtinManaged" hidden>
              <span data-i18n="smartManagedNote"></span>
              <a class="chromelink" id="onDeviceLink">chrome://on-device-internals</a>
            </div>
            <div class="hint" id="smartProgress"></div>
          </div>
          <button id="smartEnableBtn" data-i18n="optSmartEnable"></button>
        </div>
        <div class="setting stack" id="byokRow" hidden>
          <div class="byok-grid">
            <label data-i18n="optByokProvider"></label>
            <select id="byokProvider">
              <option value="openai">OpenAI</option>
              <option value="gemini">Google Gemini</option>
              <option value="grok">xAI Grok</option>
              <option value="custom" data-i18n="optByokCustom"></option>
            </select>
            <label data-i18n="optByokKey"></label>
            <input type="password" id="byokKey" autocomplete="off" spellcheck="false" />
            <label data-i18n="optByokModel"></label>
            <input type="text" id="byokModel" spellcheck="false" />
            <label id="byokBaseUrlLabel" data-i18n="optByokBaseUrl" hidden></label>
            <input type="text" id="byokBaseUrl" spellcheck="false" placeholder="http://localhost:11434/v1" hidden />
          </div>
          <div class="warnbox" id="byokWarn" hidden data-i18n="byokNoKey"></div>
          <div class="byok-actions">
            <button id="byokTestBtn" data-i18n="optByokTest"></button>
            <span class="byok-note" id="byokStatus"></span>
          </div>
          <div class="byok-note" data-i18n="optByokPrivacy"></div>
        </div>
        <div class="setting" id="smartRegroupRow" hidden>
          <div class="info">
            <div class="label" data-i18n="optSmartRegroup"></div>
            <div class="hint" data-i18n="optSmartRegroupHint"></div>
          </div>
          <input type="checkbox" class="switch" id="smartRegroupOurs" />
        </div>

        <h3 data-i18n="optAppearanceHeader"></h3>
        <div class="setting">
          <div class="info">
            <div class="label" data-i18n="optTheme"></div>
          </div>
          <select id="theme">
            <option value="auto" data-i18n="optThemeAuto"></option>
            <option value="light" data-i18n="optThemeLight"></option>
            <option value="dark" data-i18n="optThemeDark"></option>
          </select>
        </div>
        <div class="setting">
          <div class="info">
            <div class="label" data-i18n="optIconStyle"></div>
          </div>
          <select id="iconStyle">
            <option value="color" data-i18n="optIconColor"></option>
            <option value="mono" data-i18n="optIconMono"></option>
          </select>
        </div>
        <div class="setting">
          <div class="info">
            <div class="label" data-i18n="optLanguage"></div>
          </div>
          <select id="language">
            <option value="auto" data-i18n="optThemeAuto"></option>
            <option value="en">English</option>
            <option value="ru">Русский</option>
            <option value="uk">Українська</option>
            <option value="de">Deutsch</option>
            <option value="fr">Français</option>
            <option value="es">Español</option>
            <option value="pt">Português</option>
            <option value="zh_CN">中文（简体）</option>
          </select>
        </div>
      </div>

      <div class="footrow">
        <button id="diagBtn" data-i18n="optDiag"></button>
        <span class="note" id="diagNote"></span>
      </div>
      <textarea id="diagDump" class="diagdump" spellcheck="false" readonly hidden></textarea>
    </div>

    <script src="config.js"></script>
    <script src="i18n.js"></script>
    <script src="settings-schema.js"></script>
    <script src="options.js"></script>
  </body>
</html>
