<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="theme.css" />
    <style>
      body {
        width: 344px;
        /* Chrome caps the popup at 600px tall; header and action bar stay
           pinned while the middle scrolls. */
        max-height: 600px;
        display: flex;
        flex-direction: column;
      }
      header {
        flex: none;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        padding: 14px 16px 12px;
      }
      header img {
        width: 20px;
        height: 20px;
        border-radius: 4px;
      }
      header .name {
        font-weight: 600;
        font-size: 15px;
        letter-spacing: 0.1px;
      }
      .scroll {
        flex: 1 1 auto;
        min-height: 0;
        overflow-y: auto;
      }
      section {
        padding: 12px 16px;
        border-top: 1px solid var(--border);
      }
      section.hero-section {
        padding: 0 12px 12px;
        border-top: none;
      }
      .hero {
        background: var(--tonal);
        border-radius: 12px;
        padding: 12px 14px;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px 12px;
      }
      .stat .n {
        font-size: 18px;
        font-weight: 600;
        line-height: 1.2;
      }
      .stat .l {
        font-size: 11px;
        color: var(--muted);
      }
      .stat .n .sub {
        font-size: 11px;
        font-weight: 500;
        color: var(--muted);
      }
      .warming {
        margin: 8px 2px 0;
        font-size: 11px;
        color: var(--muted);
      }
      .warming:empty {
        display: none;
      }
      .actions {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }
      .actions button {
        padding: 7px 8px;
        font-size: 12.5px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .undo-row {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-top: 10px;
      }
      .undo-row .t {
        flex: 1;
        font-size: 12px;
        color: var(--muted);
      }
      .undo-row button {
        padding: 4px 12px;
        font-size: 12px;
      }
      .toggles .row {
        padding: 5px 0;
      }
      .action-bar {
        flex: none;
        display: flex;
        align-items: center;
        justify-content: flex-end;
        gap: 2px;
        padding: 6px 10px;
        border-top: 1px solid var(--border);
      }
    </style>
  </head>
  <body>
    <header>
      <img src="icons/tt-32.png" alt="" />
      <span class="name">TrueTabs</span>
    </header>

    <div class="scroll">
      <section class="hero-section">
        <div class="hero">
          <div class="stat">
            <div class="n"><span id="tabCount">-</span> <span class="sub" id="winCount"></span></div>
            <div class="l" data-i18n="statTabs"></div>
          </div>
          <div class="stat">
            <div class="n" id="dupeCount">-</div>
            <div class="l" data-i18n="statDupes"></div>
          </div>
          <div class="stat">
            <div class="n" id="staleCount">-</div>
            <div class="l" data-i18n="statStale"></div>
          </div>
          <div class="stat">
            <div class="n" id="archivedCount">-</div>
            <div class="l" data-i18n="statArchivedToday"></div>
          </div>
        </div>
        <p class="warming" id="warming"></p>
      </section>

      <section>
        <h3 data-i18n="actionsHeader"></h3>
        <div class="actions">
          <button id="organizeBtn" data-i18n="actOrganize"></button>
          <button id="sweepBtn" data-i18n="actSweep"></button>
          <button id="archiveNowBtn" data-i18n="actArchiveNow"></button>
          <button id="mergeBtn" data-i18n="actMerge"></button>
        </div>
        <div class="undo-row" id="undoRow" hidden>
          <span class="t" id="undoText"></span>
          <button id="undoBtn" data-i18n="undoBtn"></button>
        </div>
      </section>

      <section class="toggles">
        <h3 data-i18n="automationHeader"></h3>
        <label class="row">
          <span class="switch-label" data-i18n="toggleDedup"></span>
          <input type="checkbox" id="dedupToggle" class="switch" />
        </label>
        <label class="row">
          <span class="switch-label" data-i18n="toggleArchive"></span>
          <input type="checkbox" id="archiveToggle" class="switch" />
        </label>
        <label class="row">
          <span class="switch-label" data-i18n="toggleGroup"></span>
          <input type="checkbox" id="groupToggle" class="switch" />
        </label>
      </section>

      <div id="status"></div>
    </div>

    <footer class="action-bar">
      <button type="button" class="iconbtn" id="archivePageBtn" data-i18n-title="footerArchive">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false">
          <polyline points="21 8 21 21 3 21 3 8" />
          <rect x="1" y="3" width="22" height="5" />
          <line x1="10" y1="12" x2="14" y2="12" />
        </svg>
      </button>
      <button type="button" class="iconbtn" id="githubBtn" data-i18n-title="footerGithub">
        <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true" focusable="false">
          <path d="M12 .5C5.37.5 0 5.87 0 12.5c0 5.3 3.44 9.8 8.21 11.39.6.11.82-.26.82-.58 0-.29-.01-1.05-.02-2.06-3.34.73-4.04-1.61-4.04-1.61-.55-1.39-1.34-1.76-1.34-1.76-1.09-.75.08-.73.08-.73 1.2.08 1.84 1.24 1.84 1.24 1.07 1.83 2.81 1.3 3.5.99.11-.78.42-1.3.76-1.6-2.67-.3-5.47-1.33-5.47-5.93 0-1.31.47-2.38 1.24-3.22-.12-.3-.54-1.52.12-3.18 0 0 1.01-.32 3.3 1.23a11.5 11.5 0 0 1 6 0c2.29-1.55 3.3-1.23 3.3-1.23.66 1.66.24 2.88.12 3.18.77.84 1.24 1.91 1.24 3.22 0 4.61-2.81 5.62-5.49 5.92.43.37.81 1.1.81 2.22 0 1.61-.01 2.9-.01 3.29 0 .32.22.7.83.58A12.01 12.01 0 0 0 24 12.5C24 5.87 18.63.5 12 .5z" />
        </svg>
      </button>
      <button type="button" class="iconbtn" id="reviewBtn" data-i18n-title="footerReview">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false">
          <path d="M12 2.5l2.9 5.88 6.49.95-4.7 4.58 1.11 6.46L12 17.83 6.2 20.87l1.11-6.46-4.7-4.58 6.49-.95L12 2.5z" />
        </svg>
      </button>
      <button type="button" class="iconbtn" id="donateBtn" data-i18n-title="footerDonate">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false">
          <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 1 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z" />
        </svg>
      </button>
      <a href="#" class="iconbtn" id="openOptions" data-i18n-title="optionsLink">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false">
          <circle cx="12" cy="12" r="3" />
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09a1.65 1.65 0 0 0 1.51-1 1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z" />
        </svg>
      </a>
    </footer>

    <script src="config.js"></script>
    <script src="i18n.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
